name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    env:
      # These only need to be non-empty to satisfy pipeline/config.py's
      # required-key checks at import time (triggered transitively by
      # evals/judge.py's module-level OpenAI client). No real API calls
      # happen in this job - the LLM-judge tests in evals/test_quality.py
      # are skipped unless --llm-judge is passed, which it isn't here.
      OLLAMA_API_KEY: ci-placeholder
      TIKTOK_CLIENT_KEY: ci-placeholder
      TIKTOK_CLIENT_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pipeline/uv.lock"

      - name: Set up environment (uv sync via make)
        run: make setup

      - name: Lint (ruff)
        run: uvx ruff check .

      - name: Compile check
        run: uv run python -m compileall -q .

      - name: Install synthetic eval fixture
        run: cp evals/fixtures/sample_eval_fixture.json data/eval_fixture.json

      - name: Run tests (unit + structural checks - no live API calls)
        run: uv run pytest tests/ evals/ -v

  site:
    name: site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    env:
      # Satisfies pipeline/config.py's required-key checks at import time,
      # since site/api/generate.py imports the shared pipeline/ modules.
      # No real API calls happen in this job either.
      OLLAMA_API_KEY: ci-placeholder
      TIKTOK_CLIENT_KEY: ci-placeholder
      TIKTOK_CLIENT_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # astro 7 requires Node >=22.12.0 (see astro's package.json "engines").
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Astro type/template check
        run: npm run check

      - name: Build
        run: npm run build

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "site/uv.lock"

      - name: Install Python dependencies (uv)
        run: uv sync

      - name: Lint API (ruff)
        run: uvx ruff check api

      - name: Run API tests
        run: uv run pytest tests/ -v
